spring:
  application:
    name: science-news-api
  config:
    import: optional:classpath:application-local.yaml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/science_news_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-this-dev-secret-change-this-dev-secret}

guardian:
  api-key: ${GUARDIAN_API_KEY:test}
